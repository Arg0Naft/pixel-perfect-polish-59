name: Manual sync to TimiLor

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Push current main to old repo
        env:
          TARGET_PAT: ${{ secrets.TARGET_REPO_PAT }}
        run: |
          git remote add target https://x-access-token:${TARGET_PAT}@github.com/Arg0Naft/TimiLor.git
          git push target HEAD:main --force
