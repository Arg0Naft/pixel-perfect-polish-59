<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ОДИН основной title -->
    <title>ТимиЛор — официальный сайт пептидного комплекса для слизистой носа</title>

    <!-- ОДИН основной description (можно объединить оба смысла) -->
    <meta
      name="description"
      content="ТимиЛор — официальный сайт пептидного комплекса с гиалуроновой кислотой для защиты и увлажнения слизистой носа. Официальная информация о продукте и материалах."
    />
    <meta name="author" content="ТимиЛор" />

    <!-- Canonical -->
    <link rel="canonical" href="https://timilor.ru/" />

    <!-- Подключение шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="ТимиЛор — официальный сайт пептидного комплекса для слизистой носа"
    />
    <meta
      property="og:description"
      content="ТимиЛор — пептидный комплекс с гиалуроновой кислотой для защиты и увлажнения слизистой носа. Официальная информация о продукте и материалах."
    />
    <meta property="og:url" content="https://timilor.ru/" />
    <meta property="og:site_name" content="TimiLor" />

    <!-- Structured data: WebSite -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "TimiLor",
        "url": "https://timilor.ru/",
        "description": "Официальный сайт проекта TimiLor — пептидного комплекса для слизистой носа."
      }
    </script>

    <!-- Structured data: Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "TimiLor",
        "url": "https://timilor.ru/"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
